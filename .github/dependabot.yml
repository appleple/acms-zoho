# ワークフローが使う GitHub Actions・開発用 Composer 依存・フロントエンド(npm/pnpm)依存を最新に保つ。
# patch / minor バンプは CI 通過後に .github/workflows/dependabot-auto-merge.yml が自動マージし、
# 破壊的（major）バンプはレビューして手動でマージする。
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ルートの composer.json（開発用: testing-framework / phpstan / phpcs / phpunit 等）。
  # ランタイム依存（app/composer.json の Zoho SDK）は配布物に同梱するため手動管理とする。
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      composer-dev:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # テスト基盤は検証対象の a-blog cms マイナー（現状 3.2）に手動で合わせる。3.3 以降への minor/major 昇格は
      # CI マトリクス（acms 3.2）とずれるため Dependabot に触らせない（3.2.x のパッチ更新だけは通す）。
      - dependency-name: "ablogcms/testing-framework"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  # 管理画面 UI（React / TypeScript / Vite）の依存。package.json はリポジトリ直下。
  # pnpm-lock.yaml も npm エコシステムで扱われる（Dependabot は pnpm ロックに対応）。
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
