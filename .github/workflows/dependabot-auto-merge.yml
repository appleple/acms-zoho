name: Dependabot auto-merge

# Dependabot の PR のうち patch / minor 更新を、必須チェック（CI）通過後に自動マージする。
# major 更新は手動レビューに残す。
#
# 前提（リポジトリ Settings）:
#   1. "Allow auto-merge" を有効にする。
#   2. デフォルトブランチのブランチ保護で CI ワークフローの集約ジョブ "ci" を必須ステータスチェックに
#      指定する。これが無いと --auto は待つチェックが無く、CI を経ずにマージしてしまう。
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Dependabot が作成した PR のみを対象にする。
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch/minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
